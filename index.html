<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Capture — media retrieval utility</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="frame">

  <header class="nameplate">
    <div class="nameplate-mark" aria-hidden="true">&#9670;</div>
    <div class="nameplate-text">
      <span class="nameplate-title">CAPTURE</span>
      <span class="nameplate-sub">media retrieval utility</span>
    </div>
    <div class="nameplate-status"><span class="status-dot"></span>READY</div>
  </header>

  <main>

    <section class="panel source-panel" aria-labelledby="source-label">
      <p class="eyebrow" id="source-label">Source</p>
      <form id="fetch-form" class="source-form">
        <input
          type="url"
          id="url-input"
          class="url-input"
          placeholder="Paste a link — YouTube, X, Instagram, Facebook…"
          autocomplete="off"
          required
        />
        <button type="submit" id="fetch-btn" class="fetch-btn">
          <span class="btn-label">Fetch</span>
        </button>
      </form>
      <p class="hint">Works with YouTube, X/Twitter, Instagram, Facebook, TikTok, and 1,500+ other sites.</p>
      <p class="error-text" id="error-box" role="alert" hidden></p>
    </section>

    <section class="panel media-panel" id="media-panel" hidden>
      <img id="media-thumb" class="media-thumb" alt="" />
      <div class="media-meta">
        <h2 id="media-title" class="media-title"></h2>
        <p class="media-sub">
          <span id="media-uploader"></span><span class="dot-sep" id="uploader-sep" hidden>&middot;</span><span id="media-duration" class="mono"></span>
        </p>
      </div>
    </section>

    <section class="panel ladder-panel" id="ladder-panel" hidden aria-labelledby="ladder-label">
      <p class="eyebrow" id="ladder-label">Format ladder</p>
      <div class="ladder" id="ladder-list" role="radiogroup" aria-labelledby="ladder-label"></div>
      <button type="button" id="download-btn" class="capture-btn" disabled>
        <span class="btn-label">Download</span>
      </button>
    </section>

    <section class="panel status-panel" id="status-panel" hidden aria-live="polite">
      <div class="status-row">
        <span class="tally-dot" id="tally-dot"></span>
        <span id="status-text" class="mono"></span>
      </div>
      <a id="download-link" class="download-link" hidden download>
        <span class="btn-label">Save file</span>
      </a>
    </section>

  </main>

  <footer class="footer">
    <p>Runs on <span class="mono">yt-dlp</span>. For your own content, or content you have the rights to.</p>
  </footer>

</div>

<script src="app.js"></script>
</body>
</html>
